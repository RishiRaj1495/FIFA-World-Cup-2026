[tool.ruff]
line-length = 110
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = [
    "E501",  # line length is handled by the formatter, not the linter
    "UP042", # str+Enum (not StrEnum) is the standard Pydantic v2 serialization pattern here
    "B008",  # FastAPI's Query()/Depends() as a default value is the framework's own DI idiom
]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.format]
quote-style = "double"
